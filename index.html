<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OBSIDIAN HOUSE</title>

  <style>
    body {
      margin: 0;
      background: black;
      color: white;
      font-family: Arial, sans-serif;
      text-align: center;
      overflow-x: hidden;
    }

    .hero {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    h1 {
      font-size: 70px;
      margin-bottom: 20px;
      letter-spacing: 2px;
    }

    h2 {
      color: #aaa;
      font-size: 28px;
      max-width: 800px;
      line-height: 1.4;
    }

    p {
      color: #777;
      max-width: 700px;
      font-size: 20px;
      line-height: 1.6;
      margin-top: 25px;
    }

    .btn {
      margin-top: 40px;
      padding: 18px 45px;
      background: white;
      color: black;
      border: none;
      border-radius: 14px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: scale(1.05);
    }

    .popup {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.8);
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .popup-content {
      background: #111;
      padding: 40px;
      border-radius: 20px;
      width: 90%;
      max-width: 600px;
      border: 1px solid #333;
    }

    .popup-content h3 {
      font-size: 35px;
      margin-bottom: 10px;
    }

    .popup-content p {
      color: #999;
      margin-bottom: 25px;
    }

    input,
    textarea {
      width: 100%;
      padding: 15px;
      margin-bottom: 15px;
      background: black;
      border: 1px solid #333;
      color: white;
      border-radius: 10px;
      font-size: 16px;
      box-sizing: border-box;
    }

    textarea {
      height: 140px;
      resize: none;
    }

    .submit-btn {
      width: 100%;
      padding: 18px;
      background: white;
      color: black;
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      cursor: pointer;
    }

    .close {
      float: right;
      font-size: 30px;
      cursor: pointer;
      color: white;
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>OBSIDIAN HOUSE</h1>

    <h2>
      Start Your Own Clothing Brand Without Doing The Work
    </h2>

    <p>
      We design, build, and run your clothing brand.
      You promote it.
      We split the profit.
    </p>

    <button class="btn" onclick="openPopup()">
      APPLY NOW
    </button>
  </div>

  <div class="popup" id="popup">
    <div class="popup-content">

      <span class="close" onclick="closePopup()">&times;</span>

      <h3>Start Your Project</h3>

      <p>
        Fill out the form below and Obsidian House will contact you.
      </p>

      <form>
        <input type="text" placeholder="Full Name" required>

        <input type="email" placeholder="Email Address" required>

        <input type="text" placeholder="Business Name">

        <textarea placeholder="Tell us about your project..."></textarea>

        <button type="submit" class="submit-btn">
          Submit Inquiry
        </button>
      </form>

    </div>
  </div>

  <script>
    function openPopup() {
      document.getElementById("popup").style.display = "flex";
    }

    function closePopup() {
      document.getElementById("popup").style.display = "none";
    }
  </script>

</body>
</html>
