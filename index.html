<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>OBSIDIAN HOUSE</title>

  <style>
    body{
      margin:0;
      background:black;
      color:white;
      font-family:Arial,sans-serif;
      text-align:center;
      overflow-x:hidden;
    }

    .hero{
      min-height:100vh;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      padding:20px;
      background:
      linear-gradient(rgba(0,0,0,.7), rgba(0,0,0,.7)),
      url('https://images.unsplash.com/photo-1512436991641-6745cdb1723f?q=80&w=1600&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
    }

    h1{
      font-size:70px;
      margin-bottom:10px;
      letter-spacing:3px;
    }

    h2{
      color:#aaa;
      font-size:28px;
      max-width:800px;
      line-height:1.4;
    }

    p{
      color:#777;
      max-width:700px;
      font-size:20px;
      line-height:1.6;
    }

    .btn{
      margin-top:40px;
      padding:18px 45px;
      background:white;
      color:black;
      border:none;
      border-radius:14px;
      font-size:18px;
      font-weight:bold;
      cursor:pointer;
      transition:.3s;
      text-decoration:none;
    }

    .btn:hover{
      transform:scale(1.05);
    }

    .section{
      padding:100px 20px;
    }

    .gallery{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
      gap:20px;
      max-width:1200px;
      margin:auto;
    }

    .gallery img{
      width:100%;
      height:350px;
      object-fit:cover;
      border-radius:20px;
    }
  </style>
</head>

<body>

  <div class="hero">

    <h1>OBSIDIAN HOUSE</h1>

    <h2>
      Start Your Own Clothing Brand Without Doing The Work
    </h2>

    <p>
      We design, build, and run your clothing brand.
      You promote it.
      We split the profit.
    </p>

    <a class="btn" href="https://forms.google.com" target="_blank">
      APPLY NOW
    </a>

  </div>

  <div class="section">

    <h1>OUR STYLE</h1>

    <div class="gallery">

      <img src="https://images.unsplash.com/photo-1529139574466-a303027c1d8b?q=80&w=1200&auto=format&fit=crop">

      <img src="https://images.unsplash.com/photo-1496747611176-843222e1e57c?q=80&w=1200&auto=format&fit=crop">

      <img src="https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=1200&auto=format&fit=crop">

    </div>

  </div>

</body>
</html>
